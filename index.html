<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석 및 퇴실 실시간 모니터링 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; border-radius: 1rem; }
        .status-badge { padding: 0.15rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; line-height: 1.2; }
        .status-present { background-color: #dcfce7; color: #166534; }
        .status-checkout { background-color: #dbeafe; color: #1e40af; }
        .status-absent { background-color: #fee2e2; color: #991b1b; }
        
        /* 슬림한 수동 버튼 스타일 */
        .btn-manual { font-size: 10px; background-color: #f8fafc; color: #64748b; padding: 2px 6px; border-radius: 4px; border: 1px solid #e2e8f0; transition: all 0.2s; cursor: pointer; white-space: nowrap; }
        .btn-manual:hover { background-color: #f1f5f9; border-color: #cbd5e1; }
        .btn-cancel { border-color: #fecaca; color: #ef4444; background-color: #fff; }
        .btn-cancel:hover { background-color: #fef2f2; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">WORK-UP 프로그램 출석/퇴실 모니터링 대시보드</h1>
                <p class="text-slate-500 mt-1">학습자의 입실 및 퇴실 현황을 실시간으로 관리합니다.</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button id="download-btn" onclick="downloadAttendanceCSV()" class="flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold shadow hover:bg-emerald-700 transition-all text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    결과 다운로드
                </button>
                <button id="refresh-btn" onclick="fetchSheetData()" class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-xl font-bold shadow hover:bg-blue-700 transition-all text-sm">
                    <svg id="refresh-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    <span id="refresh-text">데이터 새로고침</span>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <!-- 마스터 명단 실시간 연동 카드 (디자인 유지) -->
                <div class="glass-card p-6 shadow-sm border-l-4 border-blue-500">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                        <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                        학습자 마스터 명단 (실시간 연동)
                    </h2>
                    <div class="bg-slate-50 p-4 rounded-xl text-center border border-slate-100 mb-2">
                        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">구글 시트 연동 인원</p>
                        <p id="master-count" class="text-2xl font-black text-blue-600">0명</p>
                    </div>
                    <p class="text-[11px] text-slate-400 leading-tight">
                        * 구글 스프레드시트의 <span class="font-semibold text-slate-600">'마스터명단'</span> 시트에서 최신 대상자 데이터를 실시간으로 자동 동기화합니다.
                    </p>
                </div>

                <div id="stats-container" class="glass-card p-6 shadow-sm">
                    <h2 class="text-lg font-bold mb-4">전체 현황 요약</h2>
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-slate-500">입실 완료율</span>
                                <span id="attendance-percent" class="font-bold text-green-600">0%</span>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-2.5">
                                <div id="attendance-bar" class="bg-green-500 h-2.5 rounded-full transition-all duration-1000" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 pt-2">
                            <div class="bg-slate-50 p-3 rounded-xl text-center border border-slate-100">
                                <p class="text-[10px] text-slate-400 uppercase font-bold">대상</p>
                                <p id="total-count" class="text-xl font-black text-slate-800">0</p>
                            </div>
                            <div class="bg-green-50 p-3 rounded-xl text-center border border-green-100">
                                <p class="text-[10px] text-green-500 uppercase font-bold">입실</p>
                                <p id="present-count" class="text-xl font-black text-green-600">0</p>
                            </div>
                            <div class="bg-blue-50 p-3 rounded-xl text-center border border-blue-100">
                                <p class="text-[10px] text-blue-500 uppercase font-bold">퇴실</p>
                                <p id="checkout-count" class="text-xl font-black text-blue-600">0</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h2 class="text-lg font-bold">입/퇴실 상세 현황</h2>
                        <div class="flex gap-2">
                            <select id="session-filter" onchange="render()" class="text-sm border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="all">모든 차수</option>
                            </select>
                            <input type="text" id="search-filter" oninput="render()" placeholder="이름/사번 검색..." class="text-sm border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500" />
                        </div>
                    </div>
                    <div class="overflow-x-auto min-h-[400px]">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 text-[11px] uppercase tracking-wider font-bold">
                                    <th class="px-6 py-4">학습자 정보</th>
                                    <th class="px-6 py-4">신청 차수</th>
                                    <th class="px-6 py-4">입실 정보</th>
                                    <th class="px-6 py-4">퇴실 정보</th>
                                </tr>
                            </thead>
                            <tbody id="attendance-table-body" class="divide-y divide-slate-100 text-sm">
                                <tr>
                                    <td colspan="4" class="px-6 py-12 text-center text-slate-400">
                                        구글 시트로부터 데이터를 연동하는 중입니다...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            masterData: JSON.parse(localStorage.getItem('attendance_master_db')) || [],
            attendanceData: [],
            manualEntries: JSON.parse(localStorage.getItem('attendance_manual_records')) || {},
            isLoading: false,
            // 본인의 고유 웹 앱 URL 주소를 연동해 두었습니다.
            scriptUrl: 'https://script.google.com/macros/s/AKfycbyfunJwOJL4wlYMUc37MNDbEt69H2vS-bSh67ezYuny_72VrzZ_PHTVMClKqBTtJ0Ib/exec'
        };

        window.onload = () => {
            updateSessionFilter();
            render();
            fetchSheetData(); 
        };

        // ISO 및 UTC 표준 시간 문자열을 한글 포맷 KST 시간으로 교정하는 프론트엔드 필터
        function formatDisplayTime(timeStr) {
            if (!timeStr || timeStr === '-') return '-';
            
            // 이미 한글식 표현(오전/오후)이나 수동 마킹이 되어있다면 그대로 리턴
            if (timeStr.includes('오전') || timeStr.includes('오후') || timeStr.includes('수동')) {
                return timeStr;
            }
            
            try {
                // ISO 8601 규격 문자열인 경우 한국 로컬 시각으로 재생성
                const dateObj = new Date(timeStr);
                if (!isNaN(dateObj.getTime())) {
                    return dateObj.toLocaleString('ko-KR', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: true
                    });
                }
            } catch (e) {
                console.error("시간 형식 보정 에러:", e);
            }
            return timeStr;
        }

        function toggleManual(empId, type) {
            if (state.manualEntries[empId] && state.manualEntries[empId][type]) {
                delete state.manualEntries[empId][type];
                if (Object.keys(state.manualEntries[empId]).length === 0) delete state.manualEntries[empId];
            } else {
                const now = new Date();
                const timeStr = now.toLocaleString('ko-KR', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                }) + " (수동)";
                
                if (!state.manualEntries[empId]) state.manualEntries[empId] = {};
                state.manualEntries[empId][type] = timeStr;
            }
            localStorage.setItem('attendance_manual_records', JSON.stringify(state.manualEntries));
            render();
        }

        async function fetchSheetData() {
            if (state.isLoading) return;
            const btn = document.getElementById('refresh-btn');
            const icon = document.getElementById('refresh-icon');
            const text = document.getElementById('refresh-text');

            state.isLoading = true;
            btn.disabled = true;
            icon.classList.add('animate-spin-custom');
            text.textContent = '불러오는 중...';

            try {
                const response = await fetch(state.scriptUrl);
                if (!response.ok) throw new Error("서버 응답 오류");
                const responseText = await response.text();
                const data = JSON.parse(responseText);

                // 1. 구글 스프레드시트의 '마스터명단'에서 학생 명단 연동
                if (data.master && Array.isArray(data.master)) {
                    state.masterData = data.master.map(row => ({
                        name: String(row['성명'] || row['이름'] || '').trim(),
                        empId: String(row['사번'] || '').trim(),
                        session: String(row['신청 차수 정보'] || '').trim()
                    })).filter(s => s.name && s.empId);

                    localStorage.setItem('attendance_master_db', JSON.stringify(state.masterData));
                    updateSessionFilter();
                }

                // 2. 구글 스프레드시트의 'Sheet1'에서 실시간 출결 정보 연동
                if (data.attendance && Array.isArray(data.attendance)) {
                    state.attendanceData = data.attendance.map(row => {
                        let rawTime = row['날짜'] || row['타임스탬프'] || row['시간'] || '-';
                        return {
                            name: String(row['성명'] || row['이름'] || '').trim(),
                            empId: String(row['사번'] || '').trim(),
                            timestamp: rawTime
                        };
                    });
                }
            } catch (err) {
                console.error("데이터 로드 실패:", err);
            } finally {
                state.isLoading = false;
                btn.disabled = false;
                icon.classList.remove('animate-spin-custom');
                text.textContent = '데이터 새로고침';
                render();
            }
        }

        function updateSessionFilter() {
            const filter = document.getElementById('session-filter');
            const sessions = [...new Set(state.masterData.map(s => s.session))].sort();
            filter.innerHTML = '<option value="all">모든 차수</option>';
            sessions.forEach(s => {
                if (!s) return;
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s; 
                filter.appendChild(opt);
            });
        }

        function getProcessedData() {
            const sessionVal = document.getElementById('session-filter').value;
            const searchVal = document.getElementById('search-filter').value.toLowerCase();

            const filteredMaster = state.masterData.filter(s => {
                const matchesSession = sessionVal === 'all' || s.session === sessionVal;
                const matchesSearch = s.name.toLowerCase().includes(searchVal) || s.empId.includes(searchVal);
                return matchesSession && matchesSearch;
            });

            return filteredMaster.map(student => {
                const studentEntries = state.attendanceData.filter(a => a.empId === student.empId);
                const sheetIn = studentEntries[0]?.timestamp || null;
                const sheetOut = studentEntries[1]?.timestamp || null;
                const manual = state.manualEntries[student.empId] || {};

                return {
                    ...student,
                    // 스프레드시트 원본 시간 기록값을 안전 변환 필터에 통과시킴
                    checkIn: manual.in || (sheetIn ? formatDisplayTime(sheetIn) : null),
                    checkOut: manual.out || (sheetOut ? formatDisplayTime(sheetOut) : null),
                    isManualIn: !!manual.in,
                    isManualOut: !!manual.out
                };
            });
        }

        function render() {
            const tableBody = document.getElementById('attendance-table-body');
            
            const masterCountEl = document.getElementById('master-count');
            if (masterCountEl) {
                masterCountEl.textContent = `${state.masterData.length}명`;
            }

            if (state.masterData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="px-6 py-12 text-center text-slate-400 font-medium">구글 시트 연동 대기 중이거나 '마스터명단' 시트가 비어있습니다.</td></tr>`;
                return;
            }

            const processed = getProcessedData();
            let presentCount = 0, checkoutCount = 0;
            tableBody.innerHTML = '';

            processed.forEach(item => {
                if (item.checkIn) presentCount++;
                if (item.checkOut) checkoutCount++;

                const row = document.createElement('tr');
                row.className = item.checkIn ? 'bg-blue-50/20' : 'hover:bg-slate-50 transition-colors';
                                
                // 입실
                let inContent = '';
                if (item.checkIn) {
                    inContent = `
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <span class="status-badge status-present">입실완료</span>
                            <span class="text-[11px] text-slate-400 font-mono">${item.checkIn}</span>
                            ${item.isManualIn ? `<button onclick="toggleManual('${item.empId}', 'in')" class="btn-manual btn-cancel">취소</button>` : ''}
                        </div>
                    `;
                } else {
